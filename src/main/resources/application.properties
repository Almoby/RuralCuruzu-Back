spring.application.name=rural-curuzu

# MongoDB Atlas: la URI real se toma de la variable de entorno MONGODB_URI
# (configurala en IntelliJ: Run > Edit Configurations > Environment variables).
# Nunca escribas la URI real (con usuario y contraseña) directamente en este archivo.
# Propiedad propia (no la de Spring Boot): la lee MongoConfig directamente.
app.mongodb.uri=${MONGODB_URI}

# JWT: el secreto real también se toma de una variable de entorno (JWT_SECRET).
# Debe ser una cadena larga y aleatoria (mínimo 256 bits / 32 caracteres) en producción.
jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Logs detallados del paquete propio (busqueda de usuario, validacion de password, etc).
# En produccion conviene bajar esto a INFO.
logging.level.com.almoby.ruralcuruzu=DEBUG

# Recuperacion de contraseña: cuanto dura el enlace y a donde apunta.
# No son secretos, por eso tienen un valor por defecto y no requieren variable de entorno.
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:4200/restablecer-password}

# Envio de emails: "console" (default, solo loguea en consola) o "smtp" (envio real).
# Mientras no se configure MAIL_USERNAME/MAIL_PASSWORD, dejar en "console".
app.email.provider=${EMAIL_PROVIDER:console}

# Configuracion SMTP (solo se usa si app.email.provider=smtp). El usuario y la
# contraseña son secretos reales (para Gmail, una "contraseña de aplicacion",
# no la contraseña normal de la cuenta): siempre por variable de entorno, nunca
# escritos acá.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
