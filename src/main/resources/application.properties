spring.application.name=rural-curuzu

# MongoDB Atlas: la URI real se toma de la variable de entorno MONGODB_URI
# (configurala en IntelliJ: Run > Edit Configurations > Environment variables).
# Nunca escribas la URI real (con usuario y contraseña) directamente en este archivo.
# Propiedad propia (no la de Spring Boot): la lee MongoConfig directamente.
app.mongodb.uri=${MONGODB_URI}

# JWT: el secreto real también se toma de una variable de entorno (JWT_SECRET).
# Debe ser una cadena larga y aleatoria (mínimo 256 bits / 32 caracteres) en producción.
jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Logs detallados del paquete propio (busqueda de usuario, validacion de password, etc).
# En produccion conviene bajar esto a INFO.
logging.level.com.almoby.ruralcuruzu=DEBUG

# Recuperacion de contraseña: cuanto dura el enlace y a donde apunta.
# No son secretos, por eso tienen un valor por defecto y no requieren variable de entorno.
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:4200/reset-password}

# Envio de emails: "console" (default, solo loguea en consola) o "smtp" (envio real).
# Mientras no se configure MAIL_USERNAME/MAIL_PASSWORD, dejar en "console".
app.email.provider=${EMAIL_PROVIDER:console}

# Configuracion SMTP (solo se usa si app.email.provider=smtp). El usuario y la
# contraseña son secretos reales (para Gmail, una "contraseña de aplicacion",
# no la contraseña normal de la cuenta): siempre por variable de entorno, nunca
# escritos acá.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Bloqueo de cuenta tras contraseñas incorrectas seguidas (independiente del
# campo "estado", que es un bloqueo manual del admin).
app.login.max-intentos-fallidos=${LOGIN_MAX_INTENTOS_FALLIDOS:5}
app.login.duracion-bloqueo-minutos=${LOGIN_DURACION_BLOQUEO_MINUTOS:15}

# Rate limiting: máximo de intentos de login por IP en 5 minutos, y máximo de
# solicitudes de forgot-password por email en 1 hora (para frenar spam de correos).
app.login.max-intentos-por-ip=${LOGIN_MAX_INTENTOS_POR_IP:20}
app.password-reset.max-solicitudes-por-hora=${PASSWORD_RESET_MAX_SOLICITUDES_POR_HORA:3}

# CORS: orígenes permitidos para llamar a esta API desde el navegador (separados
# por coma si hay más de uno). Cambiar cuando el frontend tenga un dominio real.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Refresh token: cuánto dura antes de que el usuario tenga que volver a
# loguearse sí o sí (a diferencia del access token, que dura poco y se
# renueva solo con este).
app.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}

# Solicitud de socio: máximo de solicitudes por IP en 1 hora (antispam del
# formulario público "Quiero ser socio").
app.solicitud-socio.max-por-ip=${SOLICITUD_SOCIO_MAX_POR_IP:10}
